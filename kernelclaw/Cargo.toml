[workspace]
resolver = "2"
members = [
    "kernel-core",
    "kernel-memory", 
    "kernel-exec",
    "kernel-llm",
    "kernel-policy",
    "kernel-crypto",
    "kernel-notify",
    "kernel-cli",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
sled = "0.34"
rand = "0.8"

# Crypto
ed25519-dalek = { version = "2", features = ["rand_core"] }

# LLM
# rig = "0.7"  # Removed - not available on crates.io
reqwest = { version = "0.12", features = ["json"] }

# WASM
wasmtime = "28"

# Utils
thiserror = "2"
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
sha2 = "0.10"
base64 = "0.22"
cap-std = "3"
dirs = "5"
rand_core = "0.6"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true