# KernelClaw Policy - ENFORCED constraints v0.1.3
# Strong enforcement at actual tool boundary

version: "0.1.3"

# INVARIANTS - MUST NEVER be violated
invariants:
  - name: no_network_access
    description: "No network requests allowed"
  - name: no_shell_access
    description: "No shell command execution"  
  - name: no_file_write_default
    description: "File writes must be explicitly enabled"

# ACTIONS REQUIRING APPROVAL
requires_approval:
  - file_write
  - capability_escalation

# FORBIDDEN - Always denied
forbidden:
  - network_requests
  - shell_exec
  - system_state_modification

# READONLY PATHS - Cannot be modified
readonly_paths:
  - ~/.kernelclaw/keys/
  - ~/.kernelclaw/receipts/
  - /etc/
  - /root/
  - ~/.ssh/
  - ~/.aws/

# CAPABILITY ALLOWLIST - ACTUALLY ENFORCED at tool boundary
capability_allowlist:
  file_read:
    enabled: true
    allowed_paths:
      - /tmp/
      - /var/tmp/
      - ~/Documents/
    max_file_size_bytes: 1048576
  
  file_write:
    enabled: false
  
  shell:
    enabled: false
  
  calendar:
    enabled: false
  
  wasm:
    enabled: false