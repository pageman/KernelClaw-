# KernelClaw Policy - ENFORCEMENT GOALS
# v0.1.6 - NOT YET ENFORCED at tool boundary

version: "0.1.6"

# INVARIANTS - Goals to enforce
invariants:
  - name: no_network_access
    description: "Goal: No network requests - NOT YET ENFORCED"
  - name: no_shell_access  
    description: "Goal: No shell commands - NOT YET ENFORCED"
  - name: no_file_write_default
    description: "Goal: File writes disabled - NOT YET ENFORCED"

# ACTIONS REQUIRING APPROVAL
# NOT YET IMPLEMENTED
requires_approval:
  - file_write
  - capability_escalation

# FORBIDDEN - Goals
# NOT YET ENFORCED at tool boundary
forbidden:
  - network_requests
  - shell_exec
  - system_state_modification

# READONLY PATHS - Goals
# NOT YET CHECKED before file_read
readonly_paths:
  - ~/.kernelclaw/keys/
  - ~/.kernelclaw/receipts/
  - /etc/
  - /root/
  - ~/.ssh/
  - ~/.aws/

# CAPABILITY ALLOWLIST - Goals, NOT Enforced
# file_read reads allowed_paths but NOT checked in actual file_read()!
capability_allowlist:
  file_read:
    enabled: true
    allowed_paths:
      - /tmp/
      - /var/tmp/
      - ~/Documents/
    max_file_size_bytes: 1048576
  
  file_write:
    enabled: false
  
  shell:
    enabled: false
  
  calendar:
    enabled: false
  
  wasm:
    enabled: false